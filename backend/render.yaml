services:
  - type: web
    name: omar-portfolio-api
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: 3000
